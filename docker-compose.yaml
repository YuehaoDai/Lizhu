version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lizhu-postgres
    environment:
      POSTGRES_DB: lizhu
      POSTGRES_USER: lizhu
      POSTGRES_PASSWORD: lizhu
    ports:
      - "5432:5432"
    volumes:
      - lizhu-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lizhu -d lizhu"]
      interval: 5s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: lizhu-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      ETCD_CONFIG_PATH: /milvus/configs/embedEtcd.yaml
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - lizhu-milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  lizhu-pg-data:
  lizhu-milvus-data:
