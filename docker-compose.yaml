services:
  postgres:
    image: postgres:16-alpine
    container_name: lizhu-postgres
    environment:
      POSTGRES_DB: lizhu
      POSTGRES_USER: lizhu
      POSTGRES_PASSWORD: lizhu
    ports:
      - "5432:5432"
    volumes:
      - lizhu-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lizhu -d lizhu"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Milvus 依赖组件 —— 独立 etcd（解决 ARM64 embedded etcd segfault 问题）
  etcd:
    container_name: lizhu-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - lizhu-etcd-data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus 本地对象存储（替代 MinIO，减少资源占用）
  minio:
    container_name: lizhu-minio
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - lizhu-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: lizhu-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - lizhu-milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

volumes:
  lizhu-pg-data:
  lizhu-etcd-data:
  lizhu-minio-data:
  lizhu-milvus-data:
