content: |
  ========================
  【2b.AI应用练气士大道：智能体工程能力的十五境（固定映射，必须使用）】
  ========================
  AI应用练气士=借"大模型/向量检索/智能体框架/Prompt工程"之灵气施术。对应AI应用开发工程能力与系统深度。
  境界名称与Go开发练气士相同（严格遵循原著），技术内涵依原著本义向AI修行路数贴合，不可自创新名称。

  ——下五境（感知与初成 / AI灵气接触期）——
  ① 铜皮境：皮肤初硬，感知灵气存在。→ 会调用LLM API、理解Token/Context Window限制、能区分不同模型能力边界；感知灵气浓淡却尚未内化
  ② 草根境：根系下探，触及底层。→ 理解Embedding底层原理（向量空间/余弦相似度/维度特性），能解释而不只会用；知其然亦知其所以然
  ③ 柳筋境：筋络柔韧，贯通意图。→ Prompt Engineering进阶（CoT/Few-shot/结构化输出/角色设定/ReAct Prompt）；能灵活编织人机对话界面，令模型意图贯通
  ④ 骨气境：骨骼硬朗，不轻易崩溃。→ AI系统防御性设计（Fallback策略、幻觉防护、输出验证、错误恢复链路）；能写有"骨气"的AI链路，不轻易走火
  ⑤ 筑庐境：立身之所，可独立运转。→ 完整RAG Pipeline（切割/嵌入/检索/生成全链路）或基础Tool Use Agent；能独立搭建可运行的AI应用骨架

  ——中五境（内观与工程化 / AI修行深化期）——
  ⑥ 洞府境：洞悉内府，深入机理。→ 深入RAG内部（Chunking策略选型/Embedding模型选型/检索精确率调优）；能洞察系统行为而非只拼接组件
  ⑦ 观海境：登高望远，宏观全局。→ 多步Workflow与状态机设计；能从"一次调用"扩展为"整体流程全局"视野，能观AI系统架构之海
  ⑧ 龙门境：跃门而过，质的飞跃。→ 长期记忆架构（Episodic/Semantic/Procedural Memory）与跨会话状态管理；AI系统由无记忆跃升为有持续性灵魂的伙伴
  ⑨ 金丹境：凝聚核心，有据可查。→ AI可观测性+系统化Evals（LLM-as-Judge/Regression Testing/Benchmark构建）；将经验凝结为可重复验证的评估内核
  ⑩ 元婴境：灵魂自立，自主运作。→ 多Agent系统（角色分工/消息路由/Agent-as-Tool/Supervisor模式）；AI系统诞生"自主元婴"，能独立分解执行复杂任务

  ——上五境（统御与创造 / AI架构超脱期）——
  ⑪ 玉璞境：玉质已现，仍待精琢。→ 高级RAG（Hybrid Search/Re-ranking/HyDE/知识图谱）+生产治理（Guardrails/模型路由/成本优化）；系统精良但仍有上升空间
  ⑫ 仙人境：脱凡入仙，度化众生。→ Fine-tuning（LoRA/QLoRA）与数据工程；能针对垂直场景"度化"通用模型，掌握"炼化基座"之术
  ⑬ 飞升境：压榨极限，直逼硬件。→ Model Serving极致优化（vLLM/TGI/SGLang、量化/KV Cache/Speculative Decoding/Batching）；能将推理成本与延迟压至硬件边界
  ⑭ 合道境：与道合一，看透规则。→ 理解Transformer/Attention/预训练与RLHF/MoE原理；能做AI系统根因分析，不再是黑盒使用者，触碰AI运行之"道"
  ⑮ 至高境：制定规则，开创范式。→ 创造AI应用新范式、新评估方法或新工具体系；以"制定规则"而非"掌握规则"为标志
